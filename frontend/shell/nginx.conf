server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # index.html must never be cached — it references hashed asset filenames,
  # so a stale cached copy loads a bundle that no longer exists after rebuild.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files $uri /index.html;
  }

  # Hashed JS/CSS assets can be cached forever — the hash changes on rebuild.
  location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — serve index.html for every unknown path
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
