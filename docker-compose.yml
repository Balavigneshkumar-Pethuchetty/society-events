services:

  # ─── Nginx Reverse Proxy (single public entry point) ─────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: society_nginx
    restart: always
    environment:
      NGINX_ADMIN_USER:     ${NGINX_ADMIN_USER:-admin}
      NGINX_ADMIN_PASSWORD: ${NGINX_ADMIN_PASSWORD}
    ports:
      - "0.0.0.0:${NGINX_PORT:-80}:80"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - society_net

  # ─── Primary Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: society_postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       society_events
    # No host port — only other containers on society_net can reach postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d society_events"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - society_net

  # ─── Keycloak (OAuth 2.0 / OIDC) ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: society_keycloak
    restart: always
    command: start-dev --import-realm --spi-theme-cache-themes=false --spi-theme-cache-templates=false
    environment:
      KC_DB:                   postgres
      KC_DB_URL:               jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME:          ${POSTGRES_USER}
      KC_DB_PASSWORD:          ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_PROXY_HEADERS:        xforwarded     # trust X-Forwarded-* from nginx
      KC_HOSTNAME_STRICT:      "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED:         "true"
      KC_HEALTH_ENABLED:       "true"
      KC_LOG_LEVEL:            INFO
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    # No host port — accessed through nginx at /auth/
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - society_net

  # ─── pgAdmin 4 (Database GUI) — served at /pgadmin/ ──────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: society_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL:              ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD:           ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE:         "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_LOGIN_BANNER:        "'Society Events — Local Dev'"
      SCRIPT_NAME:                        /pgadmin   # pgAdmin subpath prefix
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro
    # No host port — accessed through nginx at /pgadmin/ (basic auth required)
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - society_net

  # ─── Redis (Session cache / rate-limiting) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: society_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # No host port — only accessible within society_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - society_net

  # ─── Mailpit (Local SMTP + inbox UI) — UI served at /mail/ ───────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: society_mailpit
    restart: always
    environment:
      MP_MAX_MESSAGES: 500
      MP_WEBROOT:      /mail/   # serve UI under /mail/ so nginx can proxy it
    ports:
      # SMTP port: localhost-only so app code running outside Docker can send mail.
      # Docker services on society_net use mailpit:1025 directly (no host binding needed).
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
    # UI port 8025 is NOT published — accessed through nginx at /mail/ (basic auth required)
    networks:
      - society_net

  # ─── Shell App (production build) ─────────────────────────────────────────
  # Opt-in only: docker compose --profile frontend up -d --build
  # For local dev use: make frontend  (Vite hot-reload, no Docker needed)
  frontend:
    profiles: [frontend]
    build:
      context: ./frontend/shell
      dockerfile: Dockerfile
    container_name: society_frontend
    restart: always
    # No host port — served by nginx at /
    networks:
      - society_net

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: society_postgres_data
  pgadmin_data:
    name: society_pgadmin_data
  redis_data:
    name: society_redis_data

# ─── Network ─────────────────────────────────────────────────────────────────
networks:
  society_net:
    name: society_network
    driver: bridge
