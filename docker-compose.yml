services:

  # ─── Nginx Reverse Proxy (single public entry point) ─────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: society_nginx
    restart: always
    environment:
      NGINX_PORT:           ${NGINX_PORT}
      NGINX_ADMIN_USER:     ${NGINX_ADMIN_USER:-admin}
      NGINX_ADMIN_PASSWORD: ${NGINX_ADMIN_PASSWORD}
      KEYCLOAK_PORT:        ${KEYCLOAK_PORT}
    ports:
      - "0.0.0.0:${NGINX_PORT}:${NGINX_PORT}"
    volumes:
      - nginx_logs:/var/log/nginx
    depends_on:
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${NGINX_PORT}/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── Primary Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: society_postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-society_events}
      KEYCLOAK_DB:       ${KEYCLOAK_DB:-keycloak}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-society_events}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - society_net

  # ─── Keycloak (OAuth 2.0 / OIDC) ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: society_keycloak
    restart: always
    # --features=token-exchange enables RFC 8693 token exchange required for OTP login
    command: start-dev --import-realm --features=token-exchange --spi-theme-cache-themes=false --spi-theme-cache-templates=false
    environment:
      KC_DB:                   postgres
      KC_DB_URL:               jdbc:postgresql://postgres:${POSTGRES_PORT}/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME:          ${POSTGRES_USER}
      KC_DB_PASSWORD:          ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_PROXY_HEADERS:        xforwarded     # trust X-Forwarded-* from nginx
      KC_HOSTNAME_STRICT:      "false"        # dynamic; email links use X-Forwarded-* headers
      KC_HOSTNAME_STRICT_HTTPS: "false"       # nginx handles TLS; Keycloak runs plain HTTP
      KC_HTTP_ENABLED:         "true"
      KC_HEALTH_ENABLED:       "true"
      KC_LOG_LEVEL:            INFO
      KC_HTTP_PORT:            ${KEYCLOAK_PORT}
      GOOGLE_CLIENT_ID:        ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:    ${GOOGLE_CLIENT_SECRET:-}
      GMAIL_SMTP_USER:         ${GMAIL_SMTP_USER:-}
      GMAIL_APP_PASSWORD:      ${GMAIL_APP_PASSWORD:-}
      KEYCLOAK_API_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET}
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT}:${KEYCLOAK_PORT}"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    # No host port — accessed through nginx at /auth/
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/localhost/9000; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - society_net

  # ─── pgAdmin 4 (Database GUI) — served at /pgadmin/ ──────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: society_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL:              ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD:           ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE:              "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_WTF_CSRF_ENABLED:         "False"
      PGADMIN_CONFIG_LOGIN_BANNER:             "'Society Events — Local Dev'"
      SCRIPT_NAME:                             /pgadmin   # pgAdmin subpath prefix
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro
    # No host port — accessed through nginx at /pgadmin/ (basic auth required)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/pgadmin/misc/ping | grep -q PING"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - society_net

  # ─── Redis (Session cache / rate-limiting) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: society_redis
    restart: always
    command: >
      redis-server
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning ${REDIS_PASSWORD:+-a ${REDIS_PASSWORD}} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - society_net


  # ─── User Service (port 3001) ─────────────────────────────────────────────
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: society_user_service
    restart: always
    environment:
      DB_HOST:           postgres
      DB_PORT:           ${POSTGRES_PORT}
      DB_NAME:           ${POSTGRES_DB:-society_events}
      DB_USER:           ${POSTGRES_USER}
      DB_PASSWORD:       ${POSTGRES_PASSWORD}
      KEYCLOAK_URL:              http://keycloak:${KEYCLOAK_PORT}
      KEYCLOAK_REALM:            society-events
      KEYCLOAK_PUBLIC_URL:       ${KEYCLOAK_PUBLIC_URL}
      APP_PUBLIC_URL:            ${APP_PUBLIC_URL}
      KEYCLOAK_ADMIN_USER:       ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD:   ${KEYCLOAK_ADMIN_PASSWORD}
      INTERNAL_API_KEY:          ${INTERNAL_API_KEY}
      SOCIETY_ID:                11100000-0000-0000-0000-000000000001
      SOCIETY_NAME:              ${SOCIETY_NAME:-GM Global Techies Town}
      SOCIETY_SHORT_NAME:        ${SOCIETY_SHORT_NAME:-GMGT}
      SOCIETY_CITY:              ${SOCIETY_CITY:-Bengaluru}
      SPLUNK_HEC_URL:            http://splunk:8088/services/collector/event
      SPLUNK_HEC_TOKEN:          ${SPLUNK_HEC_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - society_net

  # ─── OTP Bridge Service (port 3003) ──────────────────────────────────────
  otp-service:
    build:
      context: ./services/otp
      dockerfile: Dockerfile
    container_name: society_otp_service
    restart: always
    environment:
      REDIS_URL:                  redis://redis:${REDIS_PORT}
      REDIS_PASSWORD:             ${REDIS_PASSWORD}
      KEYCLOAK_URL:               http://keycloak:${KEYCLOAK_PORT}
      KEYCLOAK_REALM:             society-events
      KEYCLOAK_ADMIN_USER:        ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD:    ${KEYCLOAK_ADMIN_PASSWORD}
      OTP_BRIDGE_CLIENT_ID:       otp-bridge
      OTP_BRIDGE_CLIENT_SECRET:   ${OTP_BRIDGE_CLIENT_SECRET}
      USER_SERVICE_URL:           http://user-service:3001
      INTERNAL_API_KEY:           ${INTERNAL_API_KEY}
      SOCIETY_NAME:               ${SOCIETY_NAME:-GM Global Techies Town}
      SMS_GATEWAY:                ${SMS_GATEWAY:-log}
      FAST2SMS_API_KEY:           ${FAST2SMS_API_KEY:-}
      HTTP_SMS_URL:               ${HTTP_SMS_URL:-}
      HTTP_SMS_API_KEY:           ${HTTP_SMS_API_KEY:-}
      HTTP_SMS_FROM:              ${HTTP_SMS_FROM:-}
      GAMMU_CONFIG:               /etc/gammurc
      OTP_TTL_SECONDS:            300
      OTP_MAX_ATTEMPTS:           3
      OTP_RATE_LIMIT_SECONDS:     60
    # Uncomment and set USB_MODEM_DEVICE in .env when using Gammu with a physical modem:
    # devices:
    #   - ${USB_MODEM_DEVICE:-/dev/ttyUSB0}:/dev/ttyUSB0
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - society_net

  # ─── Event Service (port 3002) ───────────────────────────────────────────
  event-service:
    build:
      context: ./services/event
      dockerfile: Dockerfile
    container_name: society_event_service
    restart: always
    environment:
      DB_HOST:           postgres
      DB_PORT:           ${POSTGRES_PORT}
      DB_NAME:           ${POSTGRES_DB:-society_events}
      DB_USER:           ${POSTGRES_USER}
      DB_PASSWORD:       ${POSTGRES_PASSWORD}
      KEYCLOAK_URL:              http://keycloak:${KEYCLOAK_PORT}
      KEYCLOAK_REALM:            society-events
      KEYCLOAK_PUBLIC_URL:       ${KEYCLOAK_PUBLIC_URL}
      INTERNAL_API_KEY:          ${INTERNAL_API_KEY}
      SOCIETY_ID:                11100000-0000-0000-0000-000000000001
      SPLUNK_HEC_URL:            http://splunk:8088/services/collector/event
      SPLUNK_HEC_TOKEN:          ${SPLUNK_HEC_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - society_net

  # ─── Shell App ────────────────────────────────────────────────────────────
  # Opt-in only: docker compose --profile frontend up -d --build
  # For local dev use: npm run dev inside frontend/shell (Vite HMR, no Docker)
  frontend:
    profiles: [frontend]
    build:
      context: ./frontend/shell
      dockerfile: Dockerfile
      args:
        VITE_MODE: ${VITE_MODE:-production}
        VITE_APP_ENV: ${VITE_APP_ENV:-prod}
    container_name: society_frontend
    restart: always
    # No host port — served by nginx at /
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── MFE: Admin ─────────────────────────────────────────────────────────────
  mfe-admin:
    profiles: [frontend]
    build:
      context: ./frontend/mfe-admin
      dockerfile: Dockerfile
      args:
        VITE_MODE: ${VITE_MODE:-production}
    container_name: society_mfe_admin
    restart: always
    # No host port — served by nginx at /mfe-admin/
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── MFE: Events ─────────────────────────────────────────────────────────────
  mfe-events:
    profiles: [frontend]
    build:
      context: ./frontend/mfe-events
      dockerfile: Dockerfile
      args:
        VITE_MODE: ${VITE_MODE:-production}
    container_name: society_mfe_events
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── MFE: Booking ────────────────────────────────────────────────────────────
  mfe-booking:
    profiles: [frontend]
    build:
      context: ./frontend/mfe-booking
      dockerfile: Dockerfile
      args:
        VITE_MODE: ${VITE_MODE:-production}
    container_name: society_mfe_booking
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── MFE: Payment ────────────────────────────────────────────────────────────
  mfe-payment:
    profiles: [frontend]
    build:
      context: ./frontend/mfe-payment
      dockerfile: Dockerfile
      args:
        VITE_MODE: ${VITE_MODE:-production}
    container_name: society_mfe_payment
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-society}_postgres_data
  pgadmin_data:
    name: ${COMPOSE_PROJECT_NAME:-society}_pgadmin_data
  redis_data:
    name: ${COMPOSE_PROJECT_NAME:-society}_redis_data
  nginx_logs:
    name: ${COMPOSE_PROJECT_NAME:-society}_nginx_logs

# ─── Network ─────────────────────────────────────────────────────────────────
networks:
  society_net:
    name: ${COMPOSE_PROJECT_NAME:-society}_network
    driver: bridge
