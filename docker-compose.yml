services:

  # ─── Nginx Reverse Proxy (single public entry point) ─────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: society_nginx
    restart: always
    environment:
      NGINX_PORT:           ${NGINX_PORT}
      NGINX_ADMIN_USER:     ${NGINX_ADMIN_USER:-admin}
      NGINX_ADMIN_PASSWORD: ${NGINX_ADMIN_PASSWORD}
      KEYCLOAK_PORT:        ${KEYCLOAK_PORT}
    ports:
      - "0.0.0.0:${NGINX_PORT}:${NGINX_PORT}"
    volumes:
      - nginx_logs:/var/log/nginx
    depends_on:
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${NGINX_PORT}/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── Primary Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: society_postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       society_events
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d society_events"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - society_net

  # ─── Keycloak (OAuth 2.0 / OIDC) ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: society_keycloak
    restart: always
    command: start-dev --import-realm --spi-theme-cache-themes=false --spi-theme-cache-templates=false
    environment:
      KC_DB:                   postgres
      KC_DB_URL:               jdbc:postgresql://postgres:${POSTGRES_PORT}/keycloak
      KC_DB_USERNAME:          ${POSTGRES_USER}
      KC_DB_PASSWORD:          ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_PROXY_HEADERS:        xforwarded     # trust X-Forwarded-* from nginx
      KC_HOSTNAME_STRICT:      "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED:         "true"
      KC_HEALTH_ENABLED:       "true"
      KC_LOG_LEVEL:            INFO
      KC_HTTP_PORT:            ${KEYCLOAK_PORT}
      KC_HOSTNAME_URL:         ${KEYCLOAK_PUBLIC_URL}  # public URL for email links
      GOOGLE_CLIENT_ID:        ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:    ${GOOGLE_CLIENT_SECRET}
      GMAIL_SMTP_USER:         ${GMAIL_SMTP_USER}
      GMAIL_APP_PASSWORD:      ${GMAIL_APP_PASSWORD}
      KEYCLOAK_API_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET}
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT}:${KEYCLOAK_PORT}"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    # No host port — accessed through nginx at /auth/
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/localhost/9000; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - society_net

  # ─── pgAdmin 4 (Database GUI) — served at /pgadmin/ ──────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: society_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL:              ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD:           ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE:         "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_LOGIN_BANNER:        "'Society Events — Local Dev'"
      SCRIPT_NAME:                        /pgadmin   # pgAdmin subpath prefix
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro
    # No host port — accessed through nginx at /pgadmin/ (basic auth required)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/pgadmin/misc/ping | grep -q PING"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - society_net

  # ─── Redis (Session cache / rate-limiting) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: society_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - society_net


  # ─── User Service (port 3001) ─────────────────────────────────────────────
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: society_user_service
    restart: always
    environment:
      DB_HOST:           postgres
      DB_PORT:           ${POSTGRES_PORT}
      DB_NAME:           society_events
      DB_USER:           ${POSTGRES_USER}
      DB_PASSWORD:       ${POSTGRES_PASSWORD}
      KEYCLOAK_URL:              http://keycloak:${KEYCLOAK_PORT}
      KEYCLOAK_REALM:            society-events
      KEYCLOAK_PUBLIC_URL:       ${KEYCLOAK_PUBLIC_URL}
      KEYCLOAK_ADMIN_USER:       ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD:   ${KEYCLOAK_ADMIN_PASSWORD}
      INTERNAL_API_KEY:          ${INTERNAL_API_KEY}
      SOCIETY_ID:                11100000-0000-0000-0000-000000000001
      SOCIETY_NAME:              ${SOCIETY_NAME:-GM Global Techies Town}
      SOCIETY_SHORT_NAME:        ${SOCIETY_SHORT_NAME:-GMGT}
      SOCIETY_CITY:              ${SOCIETY_CITY:-Bengaluru}
      SPLUNK_HEC_URL:            http://splunk:8088/services/collector/event
      SPLUNK_HEC_TOKEN:          ${SPLUNK_HEC_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - society_net

  # ─── Event Service (port 3002) ───────────────────────────────────────────
  event-service:
    build:
      context: ./services/event
      dockerfile: Dockerfile
    container_name: society_event_service
    restart: always
    environment:
      DB_HOST:           postgres
      DB_PORT:           ${POSTGRES_PORT}
      DB_NAME:           society_events
      DB_USER:           ${POSTGRES_USER}
      DB_PASSWORD:       ${POSTGRES_PASSWORD}
      KEYCLOAK_URL:              http://keycloak:${KEYCLOAK_PORT}
      KEYCLOAK_REALM:            society-events
      KEYCLOAK_PUBLIC_URL:       ${KEYCLOAK_PUBLIC_URL}
      INTERNAL_API_KEY:          ${INTERNAL_API_KEY}
      SOCIETY_ID:                11100000-0000-0000-0000-000000000001
      SPLUNK_HEC_URL:            http://splunk:8088/services/collector/event
      SPLUNK_HEC_TOKEN:          ${SPLUNK_HEC_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - society_net

  # ─── Shell App (production build) ─────────────────────────────────────────
  # Opt-in only: docker compose --profile frontend up -d --build
  # For local dev use: npm run dev inside frontend/shell (Vite HMR, no Docker)
  frontend:
    profiles: [frontend]
    build:
      context: ./frontend/shell
      dockerfile: Dockerfile
    container_name: society_frontend
    restart: always
    # No host port — served by nginx at /
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── MFE: Admin (production build) ──────────────────────────────────────────
  mfe-admin:
    profiles: [frontend]
    build:
      context: ./frontend/mfe-admin
      dockerfile: Dockerfile
    container_name: society_mfe_admin
    restart: always
    # No host port — served by nginx at /mfe-admin/
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── MFE: Events (production build) ─────────────────────────────────────────
  mfe-events:
    profiles: [frontend]
    build:
      context: ./frontend/mfe-events
      dockerfile: Dockerfile
    container_name: society_mfe_events
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── MFE: Booking (production build) ────────────────────────────────────────
  mfe-booking:
    profiles: [frontend]
    build:
      context: ./frontend/mfe-booking
      dockerfile: Dockerfile
    container_name: society_mfe_booking
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── MFE: Payment (production build) ────────────────────────────────────────
  mfe-payment:
    profiles: [frontend]
    build:
      context: ./frontend/mfe-payment
      dockerfile: Dockerfile
    container_name: society_mfe_payment
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - society_net

  # ─── Splunk (monitoring profile) ────────────────────────────────────────────
  # Start with: docker compose --profile monitoring up -d splunk fluent-bit
  # Web UI:  http://localhost:8000  (admin / $SPLUNK_PASSWORD)
  # HEC:     http://splunk:8088     (internal only, token = $SPLUNK_HEC_TOKEN)
  splunk:
    profiles: [monitoring]
    build:
      context: ./splunk
      dockerfile: Dockerfile
    container_name: society_splunk
    restart: always
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD:   ${SPLUNK_PASSWORD}
      SPLUNK_HEC_TOKEN:  ${SPLUNK_HEC_TOKEN:-}
    ports:
      - "127.0.0.1:${SPLUNK_PORT}:${SPLUNK_PORT}"   # localhost only — remote access via nginx /splunk/
    volumes:
      - splunk_data:/opt/splunk/var
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/splunk/en-US/account/login || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - society_net

  # ─── Fluent Bit — nginx log shipper (monitoring profile) ─────────────────────
  fluent-bit:
    profiles: [monitoring]
    image: fluent/fluent-bit:3.1
    container_name: society_fluent_bit
    restart: always
    environment:
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN:-}
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    depends_on:
      splunk:
        condition: service_healthy
    networks:
      - society_net

  # ─── Cloudflare Tunnel ───────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: society_cloudflared
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/4f6ad36b-5a4a-4f31-9612-b11129f33205.json:/etc/cloudflared/4f6ad36b-5a4a-4f31-9612-b11129f33205.json:ro
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--config", "/etc/cloudflared/config.yml", "ingress", "validate"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - society_net

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: society_postgres_data
  pgadmin_data:
    name: society_pgadmin_data
  redis_data:
    name: society_redis_data
  nginx_logs:
    name: society_nginx_logs
  splunk_data:
    name: society_splunk_data

# ─── Network ─────────────────────────────────────────────────────────────────
networks:
  society_net:
    name: society_network
    driver: bridge
