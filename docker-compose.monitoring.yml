# Monitoring overlay — included for stage and prod only.
# Usage (directly):  docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# Usage (via make):  make up ENV=stage   |   make up ENV=prod
#
# Adds: Splunk (log aggregation) + Fluent Bit (nginx log shipper)
# Web UI: http://localhost:<SPLUNK_PORT>/splunk/   (admin / $SPLUNK_PASSWORD)
# HEC:    http://splunk:8088                       (internal only)

services:

  splunk:
    build:
      context: ./splunk
      dockerfile: Dockerfile
    container_name: society_splunk
    restart: always
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD:   ${SPLUNK_PASSWORD}
      SPLUNK_HEC_TOKEN:  ${SPLUNK_HEC_TOKEN}
    ports:
      - "127.0.0.1:${SPLUNK_PORT:-8000}:8000"
    volumes:
      - splunk_data:/opt/splunk/var
      - ./splunk/society_app:/opt/splunk/etc/apps/society_app
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/splunk/en-US/account/login || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - society_net

  fluent-bit:
    image: fluent/fluent-bit:3.1
    container_name: society_fluent_bit
    restart: always
    environment:
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN}
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    depends_on:
      splunk:
        condition: service_healthy
    networks:
      - society_net

volumes:
  splunk_data:
    name: ${COMPOSE_PROJECT_NAME:-society}_splunk_data
  nginx_logs:
    name: ${COMPOSE_PROJECT_NAME:-society}_nginx_logs

networks:
  society_net:
    name: ${COMPOSE_PROJECT_NAME:-society}_network
