# Tell Splunk to parse every event with sourcetype=fastapi as flat JSON.
# KV_MODE=json extracts all top-level keys as indexed fields — works for
# both existing events (re-indexed) and new ones.

[fastapi]
SHOULD_LINEMERGE = false
KV_MODE          = json
TIME_FORMAT      = %s
TIME_PREFIX      = "time"\s*:\s*

[nginx_access]
SHOULD_LINEMERGE = false
KV_MODE          = json

[nginx_error]
SHOULD_LINEMERGE = false
