# ── Splunk Index Definitions ──────────────────────────────────────────────────
# Retention policy:
#   society_app_errors  → 30 days   (application + API errors)
#   society_web_access  → 90 days   (nginx access logs / traffic)
#   society_security    → 365 days  (auth events, 4xx/5xx on auth paths)

[society_app_errors]
homePath   = $SPLUNK_DB/society_app_errors/db
coldPath   = $SPLUNK_DB/society_app_errors/colddb
thawedPath = $SPLUNK_DB/society_app_errors/thaweddb
frozenTimePeriodInSecs = 2592000
maxTotalDataSizeMB     = 500

[society_web_access]
homePath   = $SPLUNK_DB/society_web_access/db
coldPath   = $SPLUNK_DB/society_web_access/colddb
thawedPath = $SPLUNK_DB/society_web_access/thaweddb
frozenTimePeriodInSecs = 7776000
maxTotalDataSizeMB     = 2000

[society_security]
homePath   = $SPLUNK_DB/society_security/db
coldPath   = $SPLUNK_DB/society_security/colddb
thawedPath = $SPLUNK_DB/society_security/thaweddb
frozenTimePeriodInSecs = 31536000
maxTotalDataSizeMB     = 1000

[society_metrics]
homePath   = $SPLUNK_DB/society_metrics/db
coldPath   = $SPLUNK_DB/society_metrics/colddb
thawedPath = $SPLUNK_DB/society_metrics/thaweddb
frozenTimePeriodInSecs = 2592000
maxTotalDataSizeMB     = 200
