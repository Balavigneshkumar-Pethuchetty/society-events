worker_processes  auto;
error_log         /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    log_format main '$remote_addr - "$request" $status $body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile            on;
    keepalive_timeout   65;
    client_max_body_size 20M;

    # DNS resolver — injected at container startup by docker-entrypoint.sh
    # so it works for both Docker (127.0.0.11) and Podman (10.89.0.1 or similar).
    resolver __RESOLVER__ valid=5s ipv6=off;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m    rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=admin:10m   rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    server {
        listen 80 default_server;
        server_name _;

        limit_conn perip 30;

        # ── Security headers (applied to frontend & admin paths) ─────────────
        # X-Frame-Options is NOT set here globally — Keycloak manages its own
        # frame policy and needs iframes for OIDC flows. It is added per-location
        # below only for the frontend and admin tools.
        add_header X-Content-Type-Options  "nosniff"                         always;
        add_header X-XSS-Protection        "1; mode=block"                   always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

        # ── Block common scanner / exploit paths ──────────────────────────────
        # Explicit list — avoids blocking /.well-known/ (needed for OIDC discovery)
        location ~* \.(php|asp|aspx|jsp|cgi)$ { deny all; return 404; }
        location ~* /(wp-admin|wp-login|phpmyadmin|xmlrpc\.php|etc/passwd) {
            deny all; return 404;
        }
        location ~ /\.(git|env|svn|ssh|htaccess|DS_Store|hg|travis|circleci) {
            deny all; return 404;
        }

        # ── Internal health probe ─────────────────────────────────────────────
        location = /nginx-health {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny  all;
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── Keycloak — realm auth endpoints (used by frontend OIDC flow) ──────
        # KC_PROXY_HEADERS=xforwarded means Keycloak reads X-Forwarded-Host
        # (not Host) to build its form action URLs. We must send it with the
        # full host:port so post-login redirects include the correct port.
        location /realms/ {
            limit_req zone=auth burst=20 nodelay;
            set $kc http://keycloak:8080;
            proxy_pass           $kc;
            proxy_set_header     Host               $http_host;
            proxy_set_header     X-Forwarded-Host   $http_host;
            proxy_set_header     X-Forwarded-Proto  $scheme;
            proxy_set_header     X-Real-IP          $remote_addr;
            proxy_set_header     X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_read_timeout   60s;
            proxy_buffer_size    128k;
            proxy_buffers        4 256k;
        }

        # ── Keycloak — theme assets (CSS/images loaded during login page) ─────
        location /resources/ {
            set $kc http://keycloak:8080;
            proxy_pass        $kc;
            proxy_set_header  Host              $http_host;
            proxy_set_header  X-Forwarded-Host  $http_host;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Keycloak — JS adapter (/js/keycloak.js etc.) ─────────────────────
        location /js/ {
            set $kc http://keycloak:8080;
            proxy_pass        $kc;
            proxy_set_header  Host              $http_host;
            proxy_set_header  X-Forwarded-Host  $http_host;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Keycloak admin console (/admin/) ─────────────────────────────────
        # No nginx basic auth here: Keycloak's admin SPA makes dozens of AJAX
        # calls back to /admin/ endpoints; browsers don't forward Basic
        # credentials on XHR/fetch, causing a 401 loop. Keycloak's own
        # username/password form provides the required authentication.
        location /admin/ {
            limit_req zone=admin burst=10 nodelay;
            set $kc http://keycloak:8080;
            proxy_pass           $kc;
            proxy_set_header     Host               $http_host;
            proxy_set_header     X-Forwarded-Host   $http_host;
            proxy_set_header     X-Forwarded-Proto  $scheme;
            proxy_set_header     X-Real-IP          $remote_addr;
            proxy_set_header     X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_read_timeout   60s;
            proxy_buffer_size    128k;
            proxy_buffers        4 256k;
        }

        # ── pgAdmin (/pgadmin/) — basic auth protected ────────────────────────
        location /pgadmin/ {
            limit_req zone=admin burst=15 nodelay;
            auth_basic           "Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            set $pg http://pgadmin:80;
            proxy_pass           $pg;
            proxy_set_header     Host              $host;
            proxy_set_header     X-Real-IP         $remote_addr;
            proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header     X-Forwarded-Proto $scheme;
            proxy_read_timeout   30s;
        }

        # ── Mailpit UI (/mail/) — basic auth protected ────────────────────────
        location /mail/ {
            limit_req zone=admin burst=15 nodelay;
            auth_basic           "Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            set $mp http://mailpit:8025;
            proxy_pass           $mp;
            proxy_set_header     Host              $host;
            proxy_set_header     X-Real-IP         $remote_addr;
            proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header     X-Forwarded-Proto $scheme;
            proxy_http_version   1.1;
            proxy_set_header     Upgrade    $http_upgrade;
            proxy_set_header     Connection "upgrade";
            proxy_read_timeout   60s;
        }

        # ── Frontend (/) — catch-all, must be last ────────────────────────────
        location / {
            limit_req zone=general burst=40 nodelay;
            set $fe http://frontend:80;
            proxy_pass          $fe;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  30s;
        }
    }
}
