worker_processes  auto;
error_log         /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    # JSON format — parsed by Fluent Bit and shipped to Splunk society_web_access index
    log_format json_access escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"query":"$query_string",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time_s":$request_time,'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"cf_ray":"$http_cf_ray"'
        '}';
    access_log /var/log/nginx/access.log json_access;

    sendfile            on;
    keepalive_timeout   65;
    client_max_body_size 20M;

    # DNS resolver — injected at container startup by docker-entrypoint.sh
    # so it works for both Docker (127.0.0.11) and Podman (10.89.0.1 or similar).
    resolver __RESOLVER__ valid=5s ipv6=off;

    # ── Detect real scheme from Cloudflare CF-Visitor header ─────────────────
    # Cloudflare terminates HTTPS and forwards HTTP to nginx, so $scheme is
    # always "http". CF-Visitor carries the original scheme; fall back to
    # $scheme for direct (non-Cloudflare) access e.g. localhost dev.
    map $http_cf_visitor $real_scheme {
        default                  $scheme;
        ~*"scheme"\s*:\s*"https" https;
        ~*"scheme"\s*:\s*"http"  http;
    }

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m    rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=admin:10m   rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    server {
        listen 80 default_server;
        server_name _;

        # Keep OAuth callback URLs canonical. The Google OAuth client is
        # configured for the apex domain, so redirect www before Keycloak builds
        # its broker redirect_uri.
        if ($host = www.gm-global-techies-town.club) {
            return 301 $real_scheme://gm-global-techies-town.club$request_uri;
        }

        limit_conn perip 30;

        # ── Security headers (applied to frontend & admin paths) ─────────────
        # X-Frame-Options is NOT set here globally — Keycloak manages its own
        # frame policy and needs iframes for OIDC flows. It is added per-location
        # below only for the frontend and admin tools.
        add_header X-Content-Type-Options  "nosniff"                         always;
        add_header X-XSS-Protection        "1; mode=block"                   always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

        # ── Block common scanner / exploit paths ──────────────────────────────
        # Explicit list — avoids blocking /.well-known/ (needed for OIDC discovery)
        location ~* \.(php|asp|aspx|jsp|cgi)$ { deny all; return 404; }
        location ~* /(wp-admin|wp-login|phpmyadmin|xmlrpc\.php|etc/passwd) {
            deny all; return 404;
        }
        location ~ /\.(git|env|svn|ssh|htaccess|DS_Store|hg|travis|circleci) {
            deny all; return 404;
        }

        # ── Internal health probe ─────────────────────────────────────────────
        location = /nginx-health {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny  all;
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── Keycloak — realm auth endpoints (used by frontend OIDC flow) ──────
        # KC_PROXY_HEADERS=xforwarded means Keycloak reads X-Forwarded-Host
        # (not Host) to build its form action URLs. We must send it with the
        # full host:port so post-login redirects include the correct port.
        location /realms/ {
            limit_req zone=auth burst=20 nodelay;
            set $kc http://keycloak:8080;
            proxy_pass           $kc;
            proxy_set_header     Host               $http_host;
            proxy_set_header     X-Forwarded-Host   $http_host;
            proxy_set_header     X-Forwarded-Proto  $real_scheme;
            proxy_set_header     X-Real-IP          $remote_addr;
            proxy_set_header     X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_read_timeout   60s;
            proxy_buffer_size    128k;
            proxy_buffers        4 256k;
        }

        # ── Keycloak — theme assets (CSS/images loaded during login page) ─────
        location /resources/ {
            set $kc http://keycloak:8080;
            proxy_pass        $kc;
            proxy_set_header  Host              $http_host;
            proxy_set_header  X-Forwarded-Host  $http_host;
            proxy_set_header  X-Forwarded-Proto $real_scheme;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Keycloak — JS adapter (/js/keycloak.js etc.) ─────────────────────
        location /js/ {
            set $kc http://keycloak:8080;
            proxy_pass        $kc;
            proxy_set_header  Host              $http_host;
            proxy_set_header  X-Forwarded-Host  $http_host;
            proxy_set_header  X-Forwarded-Proto $real_scheme;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Keycloak admin console is accessed directly on port 8081 (host → container 8080).
        # The app's management panel is at /manage — no nginx conflict.

        # ── pgAdmin (/pgadmin/) — basic auth protected ────────────────────────
        location /pgadmin/ {
            limit_req zone=admin burst=15 nodelay;
            auth_basic           "Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            set $pg http://pgadmin:80;
            proxy_pass           $pg;
            proxy_set_header     Host              $host;
            proxy_set_header     X-Real-IP         $remote_addr;
            proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header     X-Forwarded-Proto $real_scheme;
            proxy_read_timeout   30s;
        }

        # ── Splunk (/splunk/) — basic auth protected ──────────────────────────
        # Splunk's web.conf sets root_endpoint=/splunk so its own links are
        # already prefixed.  We pass the full /splunk/... path to the container
        # unchanged (no rewrite) so everything resolves correctly.
        location /splunk/ {
            # No rate limiting — Splunk fires ~50 concurrent internal API calls
            # on page load; any rate cap causes 503 cascades. Already protected
            # by Basic Auth + Cloudflare WAF.
            auth_basic           "Monitoring Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            set $splunk http://splunk:8000;
            proxy_pass           $splunk;
            proxy_set_header     Host              $http_host;
            proxy_set_header     X-Forwarded-Host  $http_host;
            proxy_set_header     X-Forwarded-Proto $real_scheme;
            proxy_set_header     X-Real-IP         $remote_addr;
            proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout   120s;
            proxy_connect_timeout 30s;
            proxy_buffer_size    256k;
            proxy_buffers        4 512k;
            proxy_busy_buffers_size 512k;
        }


        # ── Swagger UI — restricted to local network only ────────────────────
        location ~* ^/api/users/(docs|redoc|openapi\.json) {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            set $us http://user-service:3001;
            rewrite ^/api/users/(.*)$ /$1 break;
            proxy_pass $us;
            proxy_set_header Host $http_host;
        }

        # ── Swagger UI OAuth2 redirect (exact match, no prefix stripping) ─────
        # FastAPI registers this route at /api/users/docs/oauth2-redirect.
        # The general /api/users/ block strips the prefix, so this exact-match
        # location proxies the full path to user-service unchanged.
        location = /api/users/docs/oauth2-redirect {
            set $us http://user-service:3001;
            proxy_pass           $us/api/users/docs/oauth2-redirect;
            proxy_set_header     Host               $http_host;
            proxy_set_header     X-Real-IP          $remote_addr;
            proxy_set_header     X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header     X-Forwarded-Proto  $real_scheme;
        }

        # ── Event Service Swagger UI — restricted to local network only ────────
        location ~* ^/api/events/(docs|redoc|openapi\.json) {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            set $es http://event-service:3002;
            rewrite ^/api/events/(.*)$ /$1 break;
            proxy_pass $es;
            proxy_set_header Host $http_host;
        }

        # ── Event Service (/api/events/) ──────────────────────────────────────
        location /api/events/ {
            limit_req zone=general burst=40 nodelay;
            set $es http://event-service:3002;
            rewrite ^/api/events/(.*)$ /$1 break;
            proxy_pass           $es;
            proxy_set_header     Host               $http_host;
            proxy_set_header     X-Forwarded-Host   $http_host;
            proxy_set_header     X-Forwarded-Proto  $real_scheme;
            proxy_set_header     X-Real-IP          $remote_addr;
            proxy_set_header     X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_read_timeout   30s;
        }

        # ── User Service (/api/users/) ────────────────────────────────────────
        location /api/users/ {
            limit_req zone=general burst=40 nodelay;
            set $us http://user-service:3001;
            rewrite ^/api/users/(.*)$ /$1 break;
            proxy_pass           $us;
            proxy_set_header     Host               $http_host;
            proxy_set_header     X-Forwarded-Host   $http_host;
            proxy_set_header     X-Forwarded-Proto  $real_scheme;
            proxy_set_header     X-Real-IP          $remote_addr;
            proxy_set_header     X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_read_timeout   30s;
        }

        # ── MFE remoteEntry.js — never cached (always fetch latest after a rebuild) ─
        location ~* ^/mfe-(admin|events|booking|payment)/assets/remoteEntry\.js$ {
            limit_req zone=general burst=40 nodelay;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma        "no-cache"                            always;
            add_header Expires       "0"                                   always;
            set $mfe_host http://mfe-$1:80;
            rewrite ^/mfe-(?:admin|events|booking|payment)/(.*)$ /$1 break;
            proxy_pass          $mfe_host;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $real_scheme;
            proxy_read_timeout  30s;
        }

        # ── MFE: Admin (/mfe-admin/) ─────────────────────────────────────────
        location /mfe-admin/ {
            limit_req zone=general burst=40 nodelay;
            set $mfe_admin http://mfe-admin:80;
            rewrite ^/mfe-admin/(.*)$ /$1 break;
            proxy_pass          $mfe_admin;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $real_scheme;
            proxy_read_timeout  30s;
        }

        # ── MFE: Events (/mfe-events/) ───────────────────────────────────────
        location /mfe-events/ {
            limit_req zone=general burst=40 nodelay;
            set $mfe_events http://mfe-events:80;
            rewrite ^/mfe-events/(.*)$ /$1 break;
            proxy_pass          $mfe_events;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $real_scheme;
            proxy_read_timeout  30s;
        }

        # ── MFE: Booking (/mfe-booking/) ─────────────────────────────────────
        location /mfe-booking/ {
            limit_req zone=general burst=40 nodelay;
            set $mfe_booking http://mfe-booking:80;
            rewrite ^/mfe-booking/(.*)$ /$1 break;
            proxy_pass          $mfe_booking;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $real_scheme;
            proxy_read_timeout  30s;
        }

        # ── MFE: Payment (/mfe-payment/) ─────────────────────────────────────
        location /mfe-payment/ {
            limit_req zone=general burst=40 nodelay;
            set $mfe_payment http://mfe-payment:80;
            rewrite ^/mfe-payment/(.*)$ /$1 break;
            proxy_pass          $mfe_payment;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $real_scheme;
            proxy_read_timeout  30s;
        }

        # ── Frontend (/) — catch-all, must be last ────────────────────────────
        location / {
            limit_req zone=general burst=40 nodelay;
            set $fe http://frontend:80;
            proxy_pass          $fe;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $real_scheme;
            proxy_read_timeout  30s;
        }
    }
}
