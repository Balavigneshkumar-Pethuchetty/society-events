[SERVICE]
    Flush             5
    Daemon            Off
    Log_Level         warn
    Parsers_File      /fluent-bit/etc/parsers.conf

# ── Inputs ────────────────────────────────────────────────────────────────────

[INPUT]
    Name              tail
    Path              /var/log/nginx/access.log
    Parser            nginx_json
    Tag               nginx.access
    DB                /tmp/flb_nginx_access.db
    Refresh_Interval  5
    Skip_Empty_Lines  On

[INPUT]
    Name              tail
    Path              /var/log/nginx/error.log
    Tag               nginx.error
    DB                /tmp/flb_nginx_error.db
    Refresh_Interval  5
    Skip_Empty_Lines  On

# ── Outputs: ship to Splunk HEC ───────────────────────────────────────────────

[OUTPUT]
    Name              splunk
    Match             nginx.access
    Host              splunk
    Port              8088
    Splunk_Token      ${SPLUNK_HEC_TOKEN}
    Splunk_Index      society_web_access
    Splunk_Sourcetype nginx_access
    TLS               Off
    Retry_Limit       3

[OUTPUT]
    Name              splunk
    Match             nginx.error
    Host              splunk
    Port              8088
    Splunk_Token      ${SPLUNK_HEC_TOKEN}
    Splunk_Index      society_app_errors
    Splunk_Sourcetype nginx_error
    TLS               Off
    Retry_Limit       3
